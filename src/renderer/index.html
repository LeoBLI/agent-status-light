<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentWatch</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-state="idle">
    <main id="app" class="shell" role="button" tabindex="0" aria-label="AgentWatch">
      <header class="titlebar">
        <span>AgentWatch</span>
        <div class="title-actions">
          <button id="toggle" type="button">Expand</button>
          <button id="hideWindow" type="button" title="Hide AgentWatch">Hide</button>
        </div>
      </header>
      <section class="overall">
        <div id="overallLight" class="light" aria-label="Idle"></div>
        <div class="copy">
          <div id="overallLabel" class="label">Idle</div>
          <div id="overallMessage" class="message">No active sessions</div>
          <div id="approvalMode" class="approval-mode">Approval mode: Not reported</div>
        </div>
      </section>
      <section class="bulk-actions" aria-label="Bulk actions">
        <button id="dismissAllDone" type="button">Dismiss all done (0)</button>
        <button id="approveAllApproval" type="button">Approve all approval (0)</button>
      </section>
      <section id="tree" class="tree" aria-live="polite"></section>
      <button id="scrollMore" class="scroll-more" type="button" hidden>↓ More</button>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
